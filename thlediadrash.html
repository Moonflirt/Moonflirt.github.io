<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Εφαρμογή Τηλεδιάδρασης</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        
        <div class="top-section">
            
            <div class="video-area">
                <div class="main-stream">
                    <h2>MORNING REPORT</h2>
                    <p class="time-stamp">7:10 AM</p>
                    
                    <div class="pip-window">
                        παράθυρο παρουσίασης
                    </div>
                </div>
            </div>
            
            <div class="chat-area">
                <div class="chat-header">events | chat</div>
                <div class="chat-logs">
                    <div class="log-item"><span class="log-time">17:01</span> Event: A notification arrives...</div>
                    <div class="log-item"><span class="log-time">16:52</span> Event: A notification arrives...</div>
                    <div class="log-item"><span class="log-time">16:43</span> Event: A notification arrives...</div>
                    <div class="log-item"><span class="log-time">16:34</span> Event: A notification arrives...</div>
                </div>
            </div>
            
        </div>

        <div class="users-section">
            <div class="user-box">USER 1 AREA</div>
            <div class="user-box">USER 2 AREA</div>
            <div class="user-box">USER 3 AREA</div>
            <div class="user-box">USER 4 AREA</div>
        </div>

    </div>

</body>
</html>
